services:
  - type: web
    name: job-copilot-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-copilot-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: API_KEY
        generateValue: true

  - type: web
    name: job-copilot-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_API_KEY
        sync: false

databases:
  - name: job-copilot-db
    plan: free
    databaseName: job_copilot
    user: copilot
